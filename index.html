<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de atividade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>To-Do</h1>

    <form id="form">
        <input type="text" class="input" id="input" placeholder="envie sua tarefa!">

    
        <ul class="todos" id="todos"><h3>Lista</h3></ul>
    </form>

    <small>Clique se sua tarefa for concluída. <br>Clique com o botão direito para excluir</small>
    
    <script src="script.js"></script>
</body>
</html>
